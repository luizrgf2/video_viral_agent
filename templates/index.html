<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Viral Agent - Extrator de Momentos Virais</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .main-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #764ba2;
            background: #e9ecef;
        }
        .upload-area.dragover {
            border-color: #28a745;
            background: #d4edda;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .video-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .video-card video {
            width: 100%;
            border-radius: 15px 15px 0 0;
        }
        .status-processing {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .status-completed {
            background: #d4edda;
            border-left: 4px solid #28a745;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
        #videoPreview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-container">
            <h1 class="text-center mb-4">
                🎬 Video Viral Agent
            </h1>
            <p class="text-center text-muted mb-5">
                Extraia automaticamente os momentos virais do seu vídeo usando IA
            </p>

            <!-- Upload Form -->
            <div class="card">
                <div class="card-body">
                    <form id="uploadForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Selecione o vídeo:</label>
                            <div class="upload-area" id="uploadArea">
                                <input type="file" id="videoFile" accept=".mp4,.mov,.avi,.mkv" style="display: none;">
                                <div id="uploadContent">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-cloud-upload mb-3" viewBox="0 0 16 16">
                                        <path d="M7.636 13V3a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v10a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5zm0 1a.5.5 0 0 1 .5.5h1a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-3zm3.5-4.5a.5.5 0 0 0-.5-.5h-2a.5.5 0 0 0-.5.5v5a.5.5 0 0 0 .5.5h2a.5.5 0 0 0 .5-.5v-5z"/>
                                        <path fill-rule="evenodd" d="M5 3a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V3zm3 4a.5.5 0 0 1 .5.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0 2a.5.5 0 0 1 .5.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0 2a.5.5 0 0 1 .5.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5z"/>
                                    </svg>
                                    <h5>Clique ou arraste o vídeo aqui</h5>
                                    <p class="text-muted mb-0">MP4, MOV, AVI, MKV (máx. 500MB)</p>
                                </div>
                                <div id="fileInfo" style="display: none;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-file-earmark-play mb-2 text-success" viewBox="0 0 16 16">
                                        <path d="M6 6.855v-1.7h1.7v1.7H6zm0 3.4v-1.7h1.7v1.7H6zm-3.4 0v-1.7h1.7v1.7H2.6zm0-3.4v-1.7h1.7v1.7H2.6zm6.8 0v-1.7h1.7v1.7H9.4zm-3.4 0v-1.7h1.7v1.7H6zm0 3.4v-1.7h1.7v1.7H6z"/>
                                        <path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2zM9.5 3A1.5 1.5 0 0 0 11 1.5 1.5 0 0 0 9.5 3zm-3.4 6.8v-1.7h1.7v1.7H6.1zm0 3.4v-1.7h1.7v1.7H6.1z"/>
                                    </svg>
                                    <h5 id="fileName" class="text-success"></h5>
                                    <p id="fileSize" class="text-muted mb-0"></p>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="clearFile()">Trocar arquivo</button>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="criteria" class="form-label fw-bold">Critério de análise:</label>
                            <textarea class="form-control" id="criteria" rows="3"
                                placeholder="Ex: Capture somente partes onde ele cita desenvolvedores plenos e somente isso, se não citar desenvolvedor pleno eu não quero"></textarea>
                            <div class="form-text">Descreva quais momentos você quer extrair do vídeo</div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100" id="submitBtn" disabled>
                            🚀 Processar Vídeo
                        </button>
                    </form>

                    <!-- Status Messages -->
                    <div id="statusArea"></div>

                    <!-- Video Preview -->
                    <div id="videoPreviewContainer" style="display: none;">
                        <video id="videoPreview" controls></video>
                    </div>
                </div>
            </div>

            <!-- Results Section -->
            <div id="resultsSection" style="display: none;">
                <h2 class="text-center mb-4">🎯 Momentos Virais Identificados</h2>
                <div id="clipsContainer"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const videoFile = document.getElementById('videoFile');
        const uploadContent = document.getElementById('uploadContent');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const submitBtn = document.getElementById('submitBtn');
        const statusArea = document.getElementById('statusArea');
        const resultsSection = document.getElementById('resultsSection');
        const clipsContainer = document.getElementById('clipsContainer');
        const videoPreview = document.getElementById('videoPreview');
        const videoPreviewContainer = document.getElementById('videoPreviewContainer');

        let currentSessionId = null;
        let statusCheckInterval = null;

        // Drag and drop
        uploadArea.addEventListener('click', () => videoFile.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        videoFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            if (!file.name.match(/\.(mp4|mov|avi|mkv)$/i)) {
                alert('Por favor, selecione um arquivo de vídeo válido (MP4, MOV, AVI, MKV)');
                return;
            }

            // Show file info
            uploadContent.style.display = 'none';
            fileInfo.style.display = 'block';
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            submitBtn.disabled = false;

            // Preview video
            const url = URL.createObjectURL(file);
            videoPreview.src = url;
            videoPreviewContainer.style.display = 'block';
        }

        function clearFile() {
            videoFile.value = '';
            uploadContent.style.display = 'block';
            fileInfo.style.display = 'none';
            submitBtn.disabled = true;
            videoPreview.src = '';
            videoPreviewContainer.style.display = 'none';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Form submission
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const file = videoFile.files[0];
            const criteria = document.getElementById('criteria').value;

            if (!file || !criteria) {
                alert('Por favor, selecione um vídeo e informe o critério de análise');
                return;
            }

            // Show processing status
            submitBtn.disabled = true;
            statusArea.innerHTML = `
                <div class="status-processing">
                    <div class="text-center">
                        <div class="spinner-border text-warning mb-3" role="status"></div>
                        <h5>🎬 Processando vídeo...</h5>
                        <p class="mb-0">Isso pode levar alguns minutos dependendo do tamanho do vídeo</p>
                    </div>
                </div>
            `;

            const formData = new FormData();
            formData.append('video', file);
            formData.append('criteria', criteria);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    currentSessionId = result.session_id;
                    statusArea.innerHTML = `
                        <div class="status-processing">
                            <div class="text-center">
                                <div class="spinner-border text-info mb-3" role="status"></div>
                                <h5>📝 Analisando áudio e identificando momentos...</h5>
                                <p class="mb-0">Por favor, aguarde enquanto a IA processa seu vídeo</p>
                            </div>
                        </div>
                    `;

                    // Start checking status
                    checkStatus();
                } else {
                    throw new Error(result.error || 'Erro ao fazer upload');
                }
            } catch (error) {
                statusArea.innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        <h5>❌ Erro: ${error.message}</h5>
                    </div>
                `;
                submitBtn.disabled = false;
            }
        });

        async function checkStatus() {
            if (!currentSessionId) return;

            try {
                const response = await fetch(`/status/${currentSessionId}`);
                const result = await response.json();

                if (result.status === 'completed') {
                    // Stop checking status
                    if (statusCheckInterval) {
                        clearInterval(statusCheckInterval);
                    }

                    // Show completed status
                    statusArea.innerHTML = `
                        <div class="status-completed">
                            <div class="text-center">
                                <h5>✅ Processamento concluído!</h5>
                                <p class="mb-0">Encontramos ${result.clips_count} momentos virais no seu vídeo</p>
                            </div>
                        </div>
                    `;

                    // Load clips
                    await loadClips();

                } else if (result.status === 'processing') {
                    // Continue checking
                    statusCheckInterval = setTimeout(checkStatus, 3000);
                }
            } catch (error) {
                console.error('Error checking status:', error);
                statusCheckInterval = setTimeout(checkStatus, 3000);
            }
        }

        async function loadClips() {
            try {
                const response = await fetch(`/clips/${currentSessionId}`);
                const result = await response.json();

                if (response.ok && result.clips.length > 0) {
                    resultsSection.style.display = 'block';
                    clipsContainer.innerHTML = '';

                    result.clips.forEach((clip, index) => {
                        const clipCard = document.createElement('div');
                        clipCard.className = 'card video-card';
                        clipCard.innerHTML = `
                            <video controls preload="metadata">
                                <source src="${clip.url}" type="video/mp4">
                                Seu navegador não suporta vídeos.
                            </video>
                            <div class="card-body">
                                <h5 class="card-title">🎬 Momento ${index + 1}</h5>
                                <p class="card-text">
                                    <strong>Tamanho:</strong> ${clip.size_mb} MB<br>
                                    <a href="${clip.url}" download class="btn btn-sm btn-primary">⬇️ Download</a>
                                </p>
                            </div>
                        `;
                        clipsContainer.appendChild(clipCard);
                    });
                } else {
                    resultsSection.innerHTML = '<p class="text-center text-muted">Nenhum momento encontrado.</p>';
                }
            } catch (error) {
                console.error('Error loading clips:', error);
            }
        }
    </script>
</body>
</html>
